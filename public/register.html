<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Register</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🚰 RK Pump Register</h1>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required>

            <input
                type="text"
                id="mobile"
                placeholder="Mobile Number"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                Register
            </button>

        </form>

        <p id="msg"></p>

        <br>

        <a href="login.html">
            Already have Account? Login
        </a>

    </div>

</div>

<script src="js/script.js"></script>

</body>

</html>
